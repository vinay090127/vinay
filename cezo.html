<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sudoku Puzzle Game</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#141e30,#243b55);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
    color:white;
}

h1{
    margin-bottom:20px;
}

#board{
    display:grid;
    grid-template-columns:repeat(9,50px);
    grid-template-rows:repeat(9,50px);
    background:white;
    padding:5px;
    border:4px solid black;
}

input{
    width:48px;
    height:48px;
    text-align:center;
    font-size:20px;
    border:1px solid #999;
    outline:none;
}

input:focus{
    background:#dfe6ff;
}

.bold-right{
    border-right:3px solid black;
}

.bold-bottom{
    border-bottom:3px solid black;
}

button{
    margin-top:20px;
    padding:12px 20px;
    border:none;
    border-radius:8px;
    background:#00b894;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#019875;
}

#result{
    margin-top:15px;
    font-size:18px;
    font-weight:bold;
}

</style>
</head>

<body>

<h1>Sudoku Puzzle</h1>

<div id="board"></div>

<button onclick="checkSudoku()">Check Solution</button>

<div id="result"></div>

<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

// ======================================
// SUPABASE URL AND ANON KEY
// ======================================

const SUPABASE_URL = "https://frwbimnghfoidnjnfuhn.supabase.co";

const SUPABASE_ANON_KEY = "sb_publishable_uSleMs6GiwmOuKIH9m4xOA__pc2sq_q";

// Create Supabase Client
const supabaseClient = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
);

// ======================================
// SUDOKU DATA
// ======================================

const puzzle = [
[5,3,"","",7,"","","",""],
[6,"","",1,9,5,"","",""],
["",9,8,"","","","",6,""],
[8,"","","",6,"","","",3],
[4,"","",8,"",3,"","",1],
[7,"","","",2,"","","",6],
["",6,"","","","",2,8,""],
["","","",4,1,9,"","",5],
["","","","",8,"","",7,9]
];

const solution = [
[5,3,4,6,7,8,9,1,2],
[6,7,2,1,9,5,3,4,8],
[1,9,8,3,4,2,5,6,7],
[8,5,9,7,6,1,4,2,3],
[4,2,6,8,5,3,7,9,1],
[7,1,3,9,2,4,8,5,6],
[9,6,1,5,3,7,2,8,4],
[2,8,7,4,1,9,6,3,5],
[3,4,5,2,8,6,1,7,9]
];

const board = document.getElementById("board");

// ======================================
// CREATE BOARD
// ======================================

for(let row=0; row<9; row++){

    for(let col=0; col<9; col++){

        const cell = document.createElement("input");

        cell.type = "text";
        cell.maxLength = "1";

        if(puzzle[row][col] !== ""){
            cell.value = puzzle[row][col];
            cell.disabled = true;
            cell.style.background = "#eee";
        }

        cell.id = row + "-" + col;

        if((col+1)%3===0 && col!==8){
            cell.classList.add("bold-right");
        }

        if((row+1)%3===0 && row!==8){
            cell.classList.add("bold-bottom");
        }

        board.appendChild(cell);
    }
}

// ======================================
// CHECK SUDOKU
// ======================================

async function checkSudoku(){

    let correct = true;

    for(let row=0; row<9; row++){

        for(let col=0; col<9; col++){

            const value = parseInt(
                document.getElementById(row + "-" + col).value
            );

            if(value !== solution[row][col]){
                correct = false;
            }
        }
    }

    const result = document.getElementById("result");

    if(correct){

        result.style.color = "lightgreen";
        result.innerHTML = "Sudoku Solved Successfully!";

        // Save Score in Supabase
        const { data, error } = await supabaseClient
        .from("sudoku_scores")
        .insert([
            {
                player_name: "Player 1",
                score: 100,
                completed_time: "5 Minutes"
            }
        ]);

        if(error){
            console.log(error);
        }

    }else{

        result.style.color = "yellow";
        result.innerHTML = "Wrong Solution. Try Again.";

    }
}

</script>

</body>
</html>
