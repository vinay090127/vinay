<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grocery List App</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#11998e,#38ef7d);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:420px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.container h2{
    text-align:center;
    margin-bottom:20px;
    color:#11998e;
}

.input-box{
    margin-bottom:15px;
}

.input-box label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

.input-box input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
}

.input-box input:focus{
    border-color:#11998e;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#11998e;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0d7f74;
}

table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}

table th,
table td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}

table th{
    background:#11998e;
    color:white;
}

#message{
    text-align:center;
    margin-top:10px;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

    <h2>Grocery List</h2>

    <div class="input-box">
        <label>Item Name</label>
        <input type="text" id="item_name">
    </div>

    <div class="input-box">
        <label>Quantity</label>
        <input type="text" id="quantity">
    </div>

    <div class="input-box">
        <label>Price</label>
        <input type="number" id="price">
    </div>

    <button onclick="addGrocery()">Add Grocery</button>

    <div id="message"></div>

    <table>
        <thead>
            <tr>
                <th>Item</th>
                <th>Quantity</th>
                <th>Price</th>
            </tr>
        </thead>
        <tbody id="groceryTable"></tbody>
    </table>

</div>

<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

// =======================================
// SUPABASE CONFIG
// =======================================

const SUPABASE_URL = "https://frwbimnghfoidnjnfuhn.supabase.co";

const SUPABASE_ANON_KEY = "sb_publishable_uSleMs6GiwmOuKIH9m4xOA__pc2sq_q";

// Create Client
const supabaseClient = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
);

// =======================================
// LOAD GROCERY ITEMS
// =======================================

async function loadGroceries(){

    const { data, error } = await supabaseClient
        .from("groceries")
        .select("*")
        .order("id", { ascending:false });

    const table = document.getElementById("groceryTable");

    table.innerHTML = "";

    if(data){

        data.forEach(item => {

            table.innerHTML += `
                <tr>
                    <td>${item.item_name}</td>
                    <td>${item.quantity}</td>
                    <td>₹${item.price}</td>
                </tr>
            `;
        });
    }
}

// =======================================
// ADD GROCERY
// =======================================

async function addGrocery(){

    const item_name = document.getElementById("item_name").value;
    const quantity = document.getElementById("quantity").value;
    const price = document.getElementById("price").value;

    const message = document.getElementById("message");

    if(item_name==="" || quantity==="" || price===""){
        message.style.color = "red";
        message.innerHTML = "Please Fill All Fields";
        return;
    }

    const { data, error } = await supabaseClient
        .from("groceries")
        .insert([
            {
                item_name:item_name,
                quantity:quantity,
                price:price
            }
        ]);

    if(error){

        message.style.color = "red";
        message.innerHTML = "Failed To Add Grocery";

    }else{

        message.style.color = "green";
        message.innerHTML = "Grocery Added Successfully";

        document.getElementById("item_name").value = "";
        document.getElementById("quantity").value = "";
        document.getElementById("price").value = "";

        loadGroceries();
    }
}

// =======================================
// INITIAL LOAD
// =======================================

loadGroceries();

</script>

</body>
</html>
